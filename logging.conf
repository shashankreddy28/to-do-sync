[loggers]
keys=root,server,client

[handlers]
keys=consoleHandler,serverFileHandler,clientFileHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler

[logger_server]
level=DEBUG
handlers=serverFileHandler
qualname=server
propagate=0

[logger_client]
level=DEBUG
handlers=clientFileHandler
qualname=client
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=simpleFormatter
args=(sys.stdout,)

[handler_serverFileHandler]
class=FileHandler
level=DEBUG
formatter=simpleFormatter
args=('server.log', 'a')

[handler_clientFileHandler]
class=FileHandler
level=DEBUG
formatter=simpleFormatter
args=('client.log', 'a')


[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s